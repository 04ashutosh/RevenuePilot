<div class="app-layout">
    <!-- Sidebar -->
     <aside class="sidebar">
        <div class="sidebar-logo">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">RevenuePilot</span>
        </div>

        <nav class="sidebar-nav">
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
                <span class="nav-icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a routerLink="/customers" routerLinkActive="active" class="nav-item">
                <span class="nav-icon">👥</span>
                <span>Customers</span>
            </a>
            <a routerLink="/subscriptions" routerLinkActive="active" class="nav-item">
                <span class="nav-icon">💳</span>
                <span>Subscriptions</span>
            </a>
            <a routerLink="/invoices" routerLinkActive="active" class="nav-item">
                <span class="nav-icon">🧾</span>
                <span>Invoices</span>
            </a>
            <a routerLink="/analytics" routerLinkActive="active" class="nav-item">
                <span class="nav-icon">📈</span>
                <span>Analytics</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a routerLink="/settings" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span>Settings</span>
            </a>
        </div>
     </aside>

     <!-- Main Content -->
      <div class="main-content">
        <!-- Top Navbar -->
         <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title">Dashboard</h1>
            </div>
            
            <div class="header-right">

                <button class="header-ai-btn" (click)="toggleChat()">
                    ⚡ Ask AI
                </button>

                <select class="tenant-select"
                        [(ngModel)]="selectedTenantId"
                        (change)="onTenantChange()">
                @for (tenant of tenants; track tenant.id){
                    <option [value]="tenant.id">
                        {{ tenant.companyName }}
                    </option>
                }
                </select>

                <div class="user-profile">A</div>
            </div>
         </header>

         <!-- Routed Page Content -->
          <main class="page-content">
            <router-outlet />
          </main>
      </div>
      <!-- CFO AI Assistant Sliding Panel -->
<div class="ai-drawer" [class.open]="isChatOpen">
    <div class="drawer-header">
        <div class="drawer-title">
            <span class="pulse-indicator"></span>
            <h3>CFO AI Assistant</h3>
        </div>
        <button class="drawer-close" (click)="toggleChat()">×</button>
    </div>
    <!-- Chat Messages -->
    <div class="drawer-messages">
        <div *ngFor="let msg of chatMessages" class="chat-bubble-wrapper" [class.user-msg-wrapper]="msg.sender === 'user'">
            <div class="avatar" *ngIf="msg.sender === 'ai'">🤖</div>
            <div class="chat-bubble" [class.user]="msg.sender === 'user'">
                <p>{{ msg.text }}</p>
            </div>
        </div>
        <div *ngIf="isAiTyping" class="chat-bubble-wrapper">
            <div class="avatar">🤖</div>
            <div class="chat-bubble loading-bubble">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    </div>
    <!-- Quick action prompts -->
    <div class="drawer-chips" *ngIf="chatMessages.length <= 1 && !isAiTyping">
        <button (click)="selectPromptChip('How is my business doing? Give me a summary.')">📊 General Health</button>
        <button (click)="selectPromptChip('Who has overdue invoices?')">⏰ Late Payers</button>
        <button (click)="selectPromptChip('How is my MRR split between subscription plans?')">💰 Subscriptions</button>
    </div>
    <!-- Chat input area -->
    <div class="drawer-input-area">
        <input type="text" 
               placeholder="Ask anything about SaaS performance..." 
               [(ngModel)]="chatInput" 
               (keyup.enter)="sendChatMessage()" />
        <button (click)="sendChatMessage()">Send</button>
    </div>
</div>
</div>
